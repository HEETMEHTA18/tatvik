name: Keep Render Backend Active 24/7

on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: read

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Health Endpoint (with retry)
        run: |
          BACKEND_URL="https://devmentor-jmjh.onrender.com/"
          MAX_RETRIES=4
          RETRY_DELAY=20

          echo "Pinging DevMentor API at $BACKEND_URL..."

          for i in $(seq 1 $MAX_RETRIES); do
            # We append || echo "000" so curl timeouts (exit code 28) don't crash the Action immediately.
            HTTP_CODE=$(curl -s -o /tmp/ping_response.txt -w "%{http_code}" \
              --max-time 90 --connect-timeout 20 \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8" \
              -H "Accept-Language: en-US,en;q=0.5" \
              -H "Connection: keep-alive" \
              -H "Upgrade-Insecure-Requests: 1" \
              -H "Sec-Fetch-Dest: document" \
              -H "Sec-Fetch-Mode: navigate" \
              -H "Sec-Fetch-Site: none" \
              -H "Sec-Fetch-User: ?1" \
              -X GET "$BACKEND_URL" || echo "000")

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✅ Backend is awake! HTTP $HTTP_CODE (attempt $i/$MAX_RETRIES)"
              cat /tmp/ping_response.txt
              exit 0
            else
              echo "⚠️  Attempt $i/$MAX_RETRIES: Backend returned HTTP $HTTP_CODE"
              if [ "$i" -lt "$MAX_RETRIES" ]; then
                echo "   Retrying in ${RETRY_DELAY}s..."
                sleep $RETRY_DELAY
              fi
            fi
          done

          echo "❌ Backend did not respond after $MAX_RETRIES attempts."
          # Don't fail the workflow — Render spin-up can take >60s on free tier
          exit 0
