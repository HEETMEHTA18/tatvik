<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="DevMentor – Your AI-powered developer mentoring and career growth companion. Track GitHub activity, get AI coaching, and accelerate your tech career.">
  <meta name="keywords" content="developer mentor, AI coach, GitHub analytics, career growth, tech skills, coding coach">
  <meta name="author" content="DevMentor">

  <!-- Theme Color (changes status bar on mobile browsers) -->
  <meta name="theme-color" content="#6C63FF">
  <meta name="msapplication-TileColor" content="#6C63FF">

  <!-- iOS / Apple PWA meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DevMentor">

  <!-- Apple Touch Icons (iOS home screen icon) -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Apple Splash Screens for various iPhone sizes -->
  <!-- iPhone 14 Pro Max -->
  <link rel="apple-touch-startup-image"
        href="icons/Icon-512.png"
        media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
  <!-- iPhone 14 Pro -->
  <link rel="apple-touch-startup-image"
        href="icons/Icon-512.png"
        media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">
  <!-- iPhone SE -->
  <link rel="apple-touch-startup-image"
        href="icons/Icon-512.png"
        media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="shortcut icon" type="image/png" href="favicon.png"/>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Open Graph / Social Sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="DevMentor – AI Developer Coach">
  <meta property="og:description" content="Track GitHub activity, get AI career coaching, and accelerate your tech career with DevMentor.">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="DevMentor – AI Developer Coach">
  <meta name="twitter:description" content="Your AI-powered developer mentoring companion.">
  <meta name="twitter:image" content="icons/Icon-512.png">

  <title>DevMentor – AI Developer Coach</title>

  <!-- Inline splash screen style for iOS PWA -->
  <style>
    /* Prevent content flash during Flutter initialization */
    body {
      margin: 0;
      padding: 0;
      background-color: #0A0A0F;
      color: #E2E8F0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    /* iOS safe area support */
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo-container {
      width: 80px;
      height: 80px;
      border: 2px solid #6C63FF;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      position: relative;
      box-shadow: 0 0 20px rgba(108, 99, 255, 0.2);
      animation: pulse 2s infinite ease-in-out;
    }

    .logo-icon {
      color: #6C63FF;
    }

    .logo-text {
      font-family: monospace;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 4px;
      color: #FFFFFF;
      margin-bottom: 60px;
    }

    .progress-bar {
      width: 200px;
      height: 2px;
      background-color: #111111;
      border-radius: 1px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 60px;
      background-color: #6C63FF;
      border-radius: 1px;
      box-shadow: 0 0 10px rgba(108, 99, 255, 0.5);
      animation: scan 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 15px rgba(108, 99, 255, 0.1);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(108, 99, 255, 0.4);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 15px rgba(108, 99, 255, 0.1);
      }
    }

    @keyframes scan {
      0% {
        left: -60px;
      }
      100% {
        left: 200px;
      }
    }
  </style>
</head>
<body>
  <div class="loading-container" id="loading-container">
    <div class="logo-container">
      <svg class="logo-icon" viewBox="0 0 24 24" width="40" height="40" fill="currentColor">
        <path d="M19 9l1.25-2.75L23 5l-2.75-1.25L19 1l-1.25 2.75L15 5l2.75 1.25L19 9zm-7.5.5L9 4 6.5 9.5 1 12l5.5 2.5L9 20l2.5-5.5 5.5-2.5-5.5-2.5zm7.5 7l-1.25 2.75L15 19l2.75 1.25L19 23l1.25-2.75L23 19l-2.75-1.25L19 16.5z"/>
      </svg>
    </div>
    <div class="logo-text">DEVMENTOR</div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <script>
    // Remove loading container once Flutter canvas/views are added to DOM
    const observer = new MutationObserver(mutations => {
      for (const mutation of mutations) {
        if (mutation.addedNodes) {
          for (let i = 0; i < mutation.addedNodes.length; i++) {
            const node = mutation.addedNodes[i];
            if (node.tagName === 'FLUTTER-VIEW' || node.tagName === 'FLT-GLASS-PANE' || (node.id && node.id.startsWith('flt-'))) {
              const loader = document.getElementById('loading-container');
              if (loader) {
                loader.style.transition = 'opacity 0.4s ease';
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 400);
              }
              observer.disconnect();
              return;
            }
          }
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
